# 自定义审查规则
rules:
  - name: "no-console-log"
    severity: P2
    pattern: "console\\.log"
    message: "生产代码中不应包含 console.log"

  - name: "no-debugger"
    severity: P1
    pattern: "debugger"
    message: "生产代码中不应包含 debugger 语句"

  - name: "sql-injection-check"
    severity: P0
    patterns:
      - "executeQuery\\(.*\\+"
      - "\\$\\{.*\\}.*SELECT"
    message: "可能的 SQL 注入风险"

# 文件过滤
ignore:
  - "**/*.min.js"
  - "**/dist/**"
  - "**/node_modules/**"
  - "**/*.lock"
  - "**/*.generated.*"
